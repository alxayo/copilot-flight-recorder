name: Release Plugin

on:
  push:
    branches:
      - "main"
    tags:
      - "v*"  # Trigger on version tags like v1.0.0
    paths:
      - ".env.example"
      - ".github/plugin/**"
      - ".github/hooks/copilot-audit.json"
      - ".github/hooks/scripts/**"
      - ".github/workflows/release-plugin.yml"
      - "README.md"
      - "scripts/build-plugin.ps1"
      - "scripts/build-plugin.sh"
      - "scripts/install-plugin.ps1"
      - "scripts/install-plugin.sh"
  workflow_dispatch:
    inputs:
      version_override:
        description: "Override version string (leave empty to read from plugin.json)"
        required: false

permissions:
  contents: write  # Required to create releases and upload assets

jobs:
  validate:
    name: Validate plugin structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          set -e
          required_files=(
            ".github/plugin/plugin.json"
            ".github/plugin/README.md"
            ".github/hooks/copilot-audit.json"
            ".github/hooks/scripts/audit-common.sh"
            ".github/hooks/scripts/audit-common.ps1"
            ".github/hooks/scripts/session-start.sh"
            ".github/hooks/scripts/session-start.ps1"
            ".github/hooks/scripts/commit-prompt.sh"
            ".github/hooks/scripts/commit-prompt.ps1"
            ".github/hooks/scripts/commit-changes.sh"
            ".github/hooks/scripts/commit-changes.ps1"
            ".github/hooks/scripts/finalize-session.sh"
            ".github/hooks/scripts/finalize-session.ps1"
          )
          missing=0
          for f in "${required_files[@]}"; do
            if [[ ! -f "$f" ]]; then
              echo "MISSING: $f"
              missing=1
            else
              echo "OK: $f"
            fi
          done
          if [[ $missing -eq 1 ]]; then
            echo "::error::Some required files are missing"
            exit 1
          fi

      - name: Validate plugin.json
        run: |
          set -e
          jq empty .github/plugin/plugin.json
          name=$(jq -r '.name' .github/plugin/plugin.json)
          version=$(jq -r '.version' .github/plugin/plugin.json)
          hooks=$(jq -r '.hooks // empty' .github/plugin/plugin.json)
          if [[ -z "$name" || "$name" == "null" ]]; then
            echo "::error::plugin.json is missing 'name'"
            exit 1
          fi
          if [[ -z "$version" || "$version" == "null" ]]; then
            echo "::error::plugin.json is missing 'version'"
            exit 1
          fi
          if [[ -z "$hooks" || "$hooks" == "null" ]]; then
            echo "::error::plugin.json is missing 'hooks' array"
            exit 1
          fi
          echo "Plugin: $name v$version"

      - name: Validate copilot-audit.json is valid JSON
        run: jq empty .github/hooks/copilot-audit.json

      - name: Check shell scripts have valid shebang
        run: |
          for script in .github/hooks/scripts/*.sh; do
            head -1 "$script" | grep -q '^#!' || {
              echo "::error::$script is missing a shebang line"
              exit 1
            }
          done

  build:
    name: Build plugin package
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      plugin_name: ${{ steps.meta.outputs.name }}
      plugin_version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enforce main branch for manual runs
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [[ "${GITHUB_REF_NAME}" != "main" ]]; then
            echo "::error::This workflow_dispatch release pipeline is restricted to the main branch."
            exit 1
          fi

      - name: Ensure release tag points to a commit on main
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          git fetch origin main --depth=1
          if ! git branch -r --contains "$GITHUB_SHA" | grep -q 'origin/main'; then
            echo "::error::Tag '$GITHUB_REF_NAME' does not point to a commit on origin/main."
            exit 1
          fi

      - name: Extract plugin metadata
        id: meta
        run: |
          name=$(jq -r '.name' .github/plugin/plugin.json)
          version=$(jq -r '.version' .github/plugin/plugin.json)
          # Allow workflow_dispatch override
          if [[ -n "${{ github.event.inputs.version_override }}" ]]; then
            version="${{ github.event.inputs.version_override }}"
          fi
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build plugin
        run: |
          chmod +x scripts/build-plugin.sh
          bash scripts/build-plugin.sh

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-zip
          path: dist/${{ steps.meta.outputs.name }}-${{ steps.meta.outputs.version }}.zip

      - name: Upload tar.gz artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-tarball
          path: dist/${{ steps.meta.outputs.name }}-${{ steps.meta.outputs.version }}.tar.gz

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ needs.build.outputs.plugin_name }} ${{ needs.build.outputs.plugin_version }}"
          body: |
            ## Installation

            ### Option 1: Download and install locally
            1. Download the `.zip` (Windows) or `.tar.gz` (Linux/macOS) archive below
            2. Extract it to a directory of your choice (e.g. `~/.copilot-plugins/copilot-flight-recorder`)
            3. Add to your VS Code `settings.json`:
               ```json
               "chat.plugins.paths": {
                 "/path/to/copilot-flight-recorder": true
               }
               ```

            ### Option 2: Install from git
            ```bash
            git clone https://github.com/${{ github.repository }}.git ~/.copilot-plugins/copilot-flight-recorder
            ```
            Then add the path to `chat.plugins.paths` as above.

            ### Option 3: Use as marketplace source
            Add to your VS Code `settings.json`:
            ```json
            "chat.plugins.marketplaces": ["${{ github.repository }}"]
            ```

            See [README](https://github.com/${{ github.repository }}#readme) for full setup instructions.
          files: |
            artifacts/plugin-zip/*.zip
            artifacts/plugin-tarball/*.tar.gz
          generate_release_notes: true
